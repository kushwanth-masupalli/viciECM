<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Minimal Org RAG Frontend</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      background: #0f172a;
      color: white;
      padding: 20px;
    }

    .container {
      max-width: 1000px;
      margin: auto;
    }

    h1 {
      text-align: center;
      margin-bottom: 25px;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 20px;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 18px;
      margin-bottom: 20px;
    }

    h2 {
      margin-top: 0;
      font-size: 18px;
    }

    input,
    textarea,
    button {
      width: 100%;
      padding: 11px;
      margin-top: 10px;
      border-radius: 6px;
      border: none;
      font-size: 14px;
    }

    input,
    textarea {
      background: #020617;
      color: white;
      border: 1px solid #475569;
    }

    textarea {
      min-height: 100px;
      resize: vertical;
    }

    button {
      background: #2563eb;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #1d4ed8;
    }

    .logout-btn {
      background: #dc2626;
    }

    .logout-btn:hover {
      background: #b91c1c;
    }

    .status {
      display: none;
      margin-top: 12px;
      padding: 12px;
      border-radius: 6px;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 14px;
    }

    .success {
      display: block;
      background: #064e3b;
      color: #bbf7d0;
    }

    .error {
      display: block;
      background: #7f1d1d;
      color: #fecaca;
    }

    .info {
      display: block;
      background: #172554;
      color: #bfdbfe;
    }

    .small {
      color: #94a3b8;
      font-size: 13px;
      margin-top: 8px;
      word-break: break-word;
    }

    .answer-box {
      background: #020617;
      border: 1px solid #475569;
      border-radius: 6px;
      padding: 12px;
      margin-top: 12px;
      min-height: 80px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    @media (max-width: 800px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Minimal Org RAG Frontend</h1>

    <div class="card">
      <h2>Backend URL</h2>
      <input
        id="apiBaseInput"
        placeholder="Example: https://your-backend.onrender.com"
      />
      <button onclick="saveApiBase()">Save Backend URL</button>
      <p class="small">
        Local: http://localhost:8000 <br />
        Deployed: https://your-backend-name.onrender.com
      </p>
      <div id="configStatus" class="status"></div>
    </div>

    <div class="grid">
      <div>
        <div class="card">
          <h2>Organization Signup</h2>

          <input id="signupEmail" type="email" placeholder="Email" />
          <input id="signupPassword" type="password" placeholder="Password" />
          <input id="signupOrgId" placeholder="Org ID" />
          <input id="signupOrgName" placeholder="Org Name" />

          <button onclick="signup()">Signup</button>

          <div id="signupStatus" class="status"></div>
        </div>
      </div>

      <div>
        <div class="card">
          <h2>Signin</h2>

          <input id="signinEmail" type="email" placeholder="Email" />
          <input id="signinPassword" type="password" placeholder="Password" />

          <button onclick="signin()">Signin</button>
          <button class="logout-btn" onclick="logout()">Logout</button>

          <p id="loginInfo" class="small">Not signed in</p>

          <div id="signinStatus" class="status"></div>
        </div>
      </div>
    </div>

    <div class="card">
      <h2>Upload Document</h2>

      <input id="uploadOrgId" placeholder="Org ID" />
      <input id="fileInput" type="file" />

      <button onclick="uploadFile()">Upload</button>

      <div id="uploadStatus" class="status"></div>
    </div>

    <div class="card">
      <h2>Chat</h2>

      <input id="chatOrgId" placeholder="Org ID" />
      <textarea id="question" placeholder="Ask your question..."></textarea>

      <button onclick="chat()">Ask</button>

      <div id="chatStatus" class="status"></div>

      <div id="answerBox" class="answer-box">
        Answer will appear here...
      </div>
    </div>
  </div>

  <script>
    let API_BASE = localStorage.getItem("API_BASE") || "";
    let isSignedIn = !!localStorage.getItem("access_token");

    document.getElementById("apiBaseInput").value = API_BASE;

    updateLoginInfo();

    function saveApiBase() {
      API_BASE = document.getElementById("apiBaseInput").value.trim();

      if (!API_BASE) {
        showStatus("configStatus", "Backend URL is required.", "error");
        return;
      }

      API_BASE = API_BASE.replace(/\/$/, "");

      localStorage.setItem("API_BASE", API_BASE);

      showStatus("configStatus", "Backend URL saved:\n" + API_BASE, "success");
    }

    function showStatus(id, message, type) {
      const el = document.getElementById(id);
      el.className = "status " + type;
      el.textContent = message;
    }

    function getToken() {
      return localStorage.getItem("access_token");
    }

    function checkApiBase() {
      if (!API_BASE) {
        showStatus("configStatus", "Please enter and save backend URL first.", "error");
        return false;
      }

      return true;
    }

    function checkSignedIn(statusId) {
      const token = getToken();

      if (!token) {
        showStatus(statusId, "Not authenticated. Please signin first.", "error");
        return false;
      }

      return true;
    }

    function updateLoginInfo() {
      const loginInfo = document.getElementById("loginInfo");
      const email = localStorage.getItem("email");
      const token = getToken();

      if (token) {
        loginInfo.textContent = "Signed in as " + (email || "user");
      } else {
        loginInfo.textContent = "Not signed in";
      }
    }

    async function handleResponse(response) {
      const contentType = response.headers.get("content-type");

      let data;

      if (contentType && contentType.includes("application/json")) {
        data = await response.json();
      } else {
        data = await response.text();
      }

      if (!response.ok) {
        if (data && data.detail) {
          throw new Error(JSON.stringify(data.detail, null, 2));
        }

        if (typeof data === "string") {
          throw new Error(data);
        }

        throw new Error(JSON.stringify(data, null, 2));
      }

      return data;
    }

    async function signup() {
      if (!checkApiBase()) return;

      const email = document.getElementById("signupEmail").value.trim();
      const password = document.getElementById("signupPassword").value.trim();
      const org_id = document.getElementById("signupOrgId").value.trim();
      const org_name = document.getElementById("signupOrgName").value.trim();

      if (!email || !password || !org_id || !org_name) {
        showStatus("signupStatus", "All signup fields are required.", "error");
        return;
      }

      const payload = {
        email,
        password,
        org_id,
        org_name
      };

      try {
        showStatus("signupStatus", "Signing up...", "info");

        const response = await fetch(`${API_BASE}/api/auth/org-signup`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });

        const data = await handleResponse(response);

        showStatus(
          "signupStatus",
          typeof data === "string" ? data : JSON.stringify(data, null, 2),
          "success"
        );

        document.getElementById("signinEmail").value = email;
        document.getElementById("uploadOrgId").value = org_id;
        document.getElementById("chatOrgId").value = org_id;
      } catch (err) {
        showStatus("signupStatus", err.message, "error");
      }
    }

    async function signin() {
      if (!checkApiBase()) return;

      const email = document.getElementById("signinEmail").value.trim();
      const password = document.getElementById("signinPassword").value.trim();

      if (!email || !password) {
        showStatus("signinStatus", "Email and password are required.", "error");
        return;
      }

      try {
        showStatus("signinStatus", "Signing in...", "info");

        const response = await fetch(`${API_BASE}/api/auth/signin`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            email,
            password
          })
        });

        const data = await handleResponse(response);

        if (!data.access_token) {
          throw new Error("Signin successful, but backend did not return access_token.");
        }

        localStorage.setItem("access_token", data.access_token);
        localStorage.setItem("token_type", data.token_type || "bearer");
        localStorage.setItem("email", email);

        isSignedIn = true;

        showStatus("signinStatus", "Signin successful.", "success");

        updateLoginInfo();
      } catch (err) {
        localStorage.removeItem("access_token");
        localStorage.removeItem("token_type");
        isSignedIn = false;

        showStatus("signinStatus", err.message, "error");

        updateLoginInfo();
      }
    }

    function logout() {
      localStorage.removeItem("access_token");
      localStorage.removeItem("token_type");
      localStorage.removeItem("email");

      isSignedIn = false;

      showStatus("signinStatus", "Logged out successfully.", "info");

      updateLoginInfo();
    }

    async function uploadFile() {
      if (!checkApiBase()) return;
      if (!checkSignedIn("uploadStatus")) return;

      const org_id = document.getElementById("uploadOrgId").value.trim();
      const file = document.getElementById("fileInput").files[0];
      const token = getToken();

      if (!org_id) {
        showStatus("uploadStatus", "Org ID is required.", "error");
        return;
      }

      if (!file) {
        showStatus("uploadStatus", "Please choose a file.", "error");
        return;
      }

      const formData = new FormData();
      formData.append("org_id", org_id);
      formData.append("file", file);

      try {
        showStatus("uploadStatus", "Uploading...", "info");

        const response = await fetch(`${API_BASE}/api/upload`, {
          method: "POST",
          headers: {
            "Authorization": `Bearer ${token}`
          },
          body: formData
        });

        const data = await handleResponse(response);

        showStatus(
          "uploadStatus",
          typeof data === "string" ? data : JSON.stringify(data, null, 2),
          "success"
        );
      } catch (err) {
        showStatus("uploadStatus", err.message, "error");
      }
    }

    async function chat() {
      if (!checkApiBase()) return;
      if (!checkSignedIn("chatStatus")) return;

      const org_id = document.getElementById("chatOrgId").value.trim();
      const question = document.getElementById("question").value.trim();
      const token = getToken();

      if (!org_id) {
        showStatus("chatStatus", "Org ID is required.", "error");
        return;
      }

      if (!question) {
        showStatus("chatStatus", "Question is required.", "error");
        return;
      }

      const payload = {
        org_id,
        question
      };

      try {
        showStatus("chatStatus", "Thinking...", "info");

        const response = await fetch(`${API_BASE}/api/chat`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${token}`
          },
          body: JSON.stringify(payload)
        });

        const data = await handleResponse(response);

        document.getElementById("answerBox").textContent =
          typeof data === "string" ? data : JSON.stringify(data, null, 2);

        showStatus("chatStatus", "Answer received.", "success");
      } catch (err) {
        showStatus("chatStatus", err.message, "error");
      }
    }
  </script>
</body>
</html>
